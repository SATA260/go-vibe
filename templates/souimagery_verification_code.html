<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Souimagery 验证码</title>
</head>
<body style="margin:0; padding:0; background-color:#f5f7fb; font-family:Arial, 'Microsoft YaHei', sans-serif; color:#1f2937;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#f5f7fb; margin:0; padding:0;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width:560px; background-color:#ffffff; border-radius:8px; overflow:hidden; border:1px solid #e5e7eb;">
          <tr>
            <td style="padding:28px 32px 20px 32px; border-bottom:1px solid #edf0f5;">
              <div style="font-size:24px; font-weight:700; color:#111827; line-height:1.3;">Souimagery</div>
              <div style="font-size:14px; color:#6b7280; line-height:1.6; margin-top:6px;">网站验证码</div>
            </td>
          </tr>
          <tr>
            <td style="padding:32px;">
              <p style="margin:0 0 16px 0; font-size:16px; line-height:1.8; color:#374151;">尊敬的{{name}}，您好：</p>
              <p style="margin:0 0 22px 0; font-size:16px; line-height:1.8; color:#374151;">您正在进行 Souimagery 网站的身份验证，请使用以下验证码完成操作：</p>
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="margin:0 0 24px 0;">
                <tr>
                  <td align="center" style="background-color:#f0f6ff; border:1px solid #cfe0ff; border-radius:8px; padding:22px 12px;">
                    <div style="font-size:34px; line-height:1.2; font-weight:700; letter-spacing:6px; color:#1d4ed8;">{{verification_code}}</div>
                  </td>
                </tr>
              </table>
              <p style="margin:0 0 14px 0; font-size:14px; line-height:1.8; color:#4b5563;">验证码将在 {{expire_minutes}} 分钟后失效。为保障您的账号安全，请勿将验证码转发或告知他人。</p>
              <p style="margin:0; font-size:14px; line-height:1.8; color:#4b5563;">如果这不是您本人发起的操作，请忽略此邮件，或联系 Souimagery 支持团队。</p>
            </td>
          </tr>
          <tr>
            <td style="padding:20px 32px 28px 32px; background-color:#fafafa; border-top:1px solid #edf0f5;">
              <p style="margin:0 0 6px 0; font-size:12px; line-height:1.7; color:#6b7280;">此邮件由系统自动发送，请勿直接回复。</p>
              <p style="margin:0; font-size:12px; line-height:1.7; color:#9ca3af;">&copy; {{year}} Souimagery. All rights reserved.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
